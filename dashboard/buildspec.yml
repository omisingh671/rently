version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - cd dashboard
      - npm ci --include=dev

  pre_build:
    commands:
      - test -n "$VITE_API_BASE_URL" || (echo "VITE_API_BASE_URL is required" && exit 1)
      - test -n "$VITE_API_PREFIX" || (echo "VITE_API_PREFIX is required" && exit 1)

  build:
    commands:
      - npm run build

artifacts:
  base-directory: dashboard/dist
  files:
    - "**/*"